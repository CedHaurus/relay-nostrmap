db = "/var/lib/strfry/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
}

relay {
    bind = "127.0.0.1"
    port = 7777
    nofiles = 524288
    realIpHeader = "X-Real-Ip"

    info {
        name = "Nostr Map Relay"
        description = "Relay Nostr public francophone, ouvert à tous. https://nostrmap.fr"
        contact = "npub1n2878xq8jmacnjsyun6a0nrys7tcglzq8znzv05s33ddrxupd36q6uhtpg"
        pubkey = "98a5bfe0691dc6f7414bc145c3d96a26dcc0f42f541e30448ec6384c425c7b5b"
    }

    maxWebsocketPayloadSize = 65536
    autoPingSeconds = 55

    # Limites de filtres — compatibles avec les clients standard
    maxFilterLimit      = 500
    maxFilterLimitCount = 100000
    maxSubsPerConnection = 20
    maxReqFilterSize = 200

    filterValidation {
        enabled             = true
        requireAuthorOrTag  = false   # false = relay public utilisable par tous les clients
        maxFiltersPerReq    = 10
        maxKindsPerFilter   = 20
    }

    writePolicy {
        plugin = "/etc/strfry/policy.py"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll    = false
        dumpInEvents = false
        dumpInReqs   = false
        metrics      = false
    }

    numThreads {
        ingester   = 3
        reqWorker  = 3
        reqMonitor = 3
        negentropy = 2
    }
}
